<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Bets - Z2DWIN</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #ffffff; margin: 0; color: #333; overflow: hidden; }

        /* Navigation Bar */
        .nav-bar {
            display: flex; align-items: center; padding: 15px;
            background: #fff; border-bottom: 1px solid #f0f0f0;
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            text-decoration: none; color: #000; font-size: 24px; font-weight: bold;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: #f8f8f8; border-radius: 50%;
        }
        .nav-title { flex: 1; text-align: center; font-weight: bold; font-size: 16px; margin-right: 40px; }

        /* Tabs Section */
        .tabs { display: flex; border-bottom: 1px solid #eee; background: #fff; }
        .tab {
            flex: 1; text-align: center; padding: 15px 0; font-size: 13px;
            font-weight: 600; color: #888; cursor: pointer; border-bottom: 2px solid transparent;
            transition: 0.3s;
        }
        .tab.active { color: #000; border-bottom: 2px solid #000; }

        /* Empty State */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 75vh; padding: 20px; text-align: center;
        }
        
        /* Professional Animated Loader instead of Emoji */
        .loader-ring {
            width: 50px; height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #000;
            border-radius: 50%;
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
            opacity: 0.5;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .empty-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .empty-desc { font-size: 13px; color: #999; line-height: 1.5; max-width: 250px; }

        .refresh-btn {
            margin-top: 25px; padding: 12px 35px; background: #000;
            color: #fff; border: none; border-radius: 25px;
            font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .refresh-btn:active { transform: scale(0.95); }

        /* Loading Overlay for Refresh */
        #refresh-loading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 1000;
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="refresh-loading">
        <div class="loader-ring" style="opacity: 1; border-top-color: #000;"></div>
    </div>

    <div class="nav-bar">
        <a href="index2.html" class="back-btn">‹</a>
        <div class="nav-title">My Bets</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(this, 'open')">OPEN BETS</div>
        <div class="tab" onclick="switchTab(this, 'settled')">SETTLED</div>
    </div>

    <div class="empty-state">
        <div class="loader-ring"></div>
        <div class="empty-title" id="status-title">No Open Bets Found</div>
        <div class="empty-desc" id="status-desc">You haven't placed any bets yet. Your active bets will appear here.</div>
        
        <button class="refresh-btn" onclick="handleRefresh()">REFRESH PAGE</button>
    </div>

<script>
    // Tab switching logic
    function switchTab(element, type) {
        // Remove active class from all tabs
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        // Add active class to clicked tab
        element.classList.add('active');

        const title = document.getElementById('status-title');
        const desc = document.getElementById('status-desc');

        if(type === 'open') {
            title.innerText = "No Open Bets Found";
            desc.innerText = "You haven't placed any bets yet. Your active bets will appear here.";
        } else {
            title.innerText = "No Settled Bets";
            desc.innerText = "History of your completed and won bets will be shown in this section.";
        }
    }

    // Refresh button logic
    function handleRefresh() {
        const loading = document.getElementById('refresh-loading');
        loading.style.display = 'flex';
        
        // Simulating a real refresh/load
        setTimeout(() => {
            loading.style.display = 'none';
        }, 1500);
    }
</script>

</body>
</html>
