<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deposit - Z2DWIN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #ffffff; margin: 0; color: #333; padding-bottom: 30px; }

        /* Navigation Bar */
        .nav-bar {
            display: flex; align-items: center; padding: 15px;
            background: #fff; border-bottom: 1px solid #f0f0f0;
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            text-decoration: none; color: #000; font-size: 24px; font-weight: bold;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: #f8f8f8; border-radius: 50%;
        }
        .wallet-box { margin-left: auto; text-align: right; }
        .wallet-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; }
        .wallet-bal { font-size: 18px; font-weight: 800; color: #2e7d32; }

        .container { padding: 20px; }

        /* Input Section */
        .input-card { background: #fff; border-radius: 15px; margin-top: 10px; }
        .limit-info { font-size: 11px; color: #999; margin-bottom: 5px; font-weight: 500; }
        .amount-input-box {
            position: relative; border-bottom: 2px solid #eee; padding: 10px 0;
            display: flex; align-items: center;
        }
        .currency-symbol { font-size: 24px; font-weight: bold; margin-right: 10px; }
        .amount-input-box input {
            border: none; outline: none; font-size: 28px; font-weight: bold; width: 100%;
            color: #000; background: transparent;
        }

        .confirm-btn {
            width: 100%; padding: 16px; background: #000; color: #fff;
            border: none; border-radius: 12px; font-weight: bold; font-size: 16px;
            margin-top: 25px; cursor: pointer; transition: 0.3s;
        }

        /* Payment Details */
        #payment-section { display: none; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; animation: fadeIn 0.5s; }
        
        .terms-box {
            background: #fff9e6; border-left: 4px solid #ffc107; padding: 12px;
            font-size: 12px; color: #666; margin-bottom: 20px; border-radius: 4px;
        }

        .upi-details { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .detail-label { font-size: 11px; color: #777; }
        .detail-value { font-weight: bold; font-size: 14px; color: #000; }
        
        .copy-btn { 
            background: #e3f2fd; color: #1976d2; border: none; padding: 6px 12px;
            border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer;
        }

        .qr-container { text-align: center; margin: 20px 0; display: flex; flex-direction: column; align-items: center; }
        #qrcode { padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 10px; }

        .final-input {
            width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 10px;
            margin-bottom: 15px; font-size: 14px; outline: none; background: #fafafa;
        }
        .final-input:focus { border-color: #000; background: #fff; }

        /* CUSTOM MODAL CSS */
        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-box {
            width: 85%; max-width: 320px; background: #fff; border-radius: 20px;
            padding: 25px; text-align: center; animation: popUp 0.3s ease-out;
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-icon { font-size: 40px; margin-bottom: 15px; }
        .modal-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #000; }
        .modal-text { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px; }
        .modal-btn { 
            width: 100%; padding: 12px; background: #000; color: #fff; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="custom-modal">
        <div class="modal-box">
            <div id="modal-icon" class="modal-icon">⚠️</div>
            <div id="modal-title" class="modal-title">Notice</div>
            <div id="modal-text" class="modal-text">Message goes here.</div>
            <button id="modal-ok-btn" class="modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index2.html" class="back-btn">‹</a>
        <div class="wallet-box">
            <div class="wallet-label">Total Wallet</div>
            <div class="wallet-bal">₹<span id="total-bal">249.00</span></div>
        </div>
    </div>

    <div class="container">
        <h2 style="font-size: 20px; margin-bottom: 5px;">Add Cash</h2>
        <p style="font-size: 13px; color: #777; margin-bottom: 25px;">Fast & Secure Deposit</p>

        <div class="input-card">
            <div class="limit-info">Min: ₹4,000 | Max: ₹50,000</div>
            <div class="amount-input-box">
                <span class="currency-symbol">₹</span>
                <input type="number" id="dep-amt" placeholder="Enter Amount">
            </div>
        </div>

        <button class="confirm-btn" id="confirm-pay-btn" onclick="showPayment()">CONFIRM DEPOSIT</button>

        <div id="payment-section">
            <div class="terms-box">
                <strong>Important:</strong> Please transfer the exact amount and enter the 12-digit UTR correctly for instant approval.
            </div>

            <div class="upi-details">
                <div class="detail-row">
                    <div>
                        <div class="detail-label">UPI ID</div>
                        <div class="detail-value">9152779130@fam</div>
                    </div>
                    <button class="copy-btn" onclick="copyValue('9152779130@fam', 'UPI ID')">COPY</button>
                </div>
                <div class="detail-row">
                    <div>
                        <div class="detail-label">Beneficiary Name</div>
                        <div class="detail-value">Rameswar manoj trivedi</div>
                    </div>
                    <button class="copy-btn" onclick="copyValue('Rameswar manoj trivedi', 'Name')">COPY</button>
                </div>
            </div>

            <div class="qr-container">
                <p style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">Scan QR to Pay</p>
                <div id="qrcode"></div>
            </div>

            <div class="final-form">
                <input type="text" class="final-input" id="utr-id" placeholder="Enter 12 Digit UTR Number">
                <input type="text" class="final-input" id="user-upi" placeholder="Enter Your UPI ID">
                <button class="confirm-btn" style="background: #2e7d32; margin-top: 5px;" onclick="submitRequest()">SUBMIT PAYMENT</button>
            </div>
        </div>
    </div>

<script>
    // Professional Custom Popup Function
    function showModal(title, text, icon = '⚠️', isSuccess = false) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal-icon').innerText = icon;
        
        const btn = document.getElementById('modal-ok-btn');
        if(isSuccess) {
            btn.onclick = function() { window.location.href = "index2.html"; };
            btn.style.background = "#2e7d32";
        } else {
            btn.onclick = closeModal;
            btn.style.background = "#000";
        }
        
        document.getElementById('custom-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('custom-modal').style.display = 'none';
    }

    function copyValue(val, label) {
        navigator.clipboard.writeText(val);
        showModal("Copied!", `${label} has been copied to clipboard.`, '✅');
    }

    function showPayment() {
        const amt = document.getElementById('dep-amt').value;
        if(amt < 4000 || amt > 50000) {
            showModal("Limit Error", "Deposit amount must be between ₹4,000 and ₹50,000.", '❌');
            return;
        }

        document.getElementById('qrcode').innerHTML = "";
        const upiLink = `upi://pay?pa=9152779130@fam&pn=Rameswar%20manoj%20trivedi&am=${amt}&cu=INR`;

        new QRCode(document.getElementById("qrcode"), {
            text: upiLink,
            width: 160,
            height: 160
        });

        document.getElementById('payment-section').style.display = 'block';
        document.getElementById('confirm-pay-btn').style.display = 'none';
        
        window.scrollTo({ top: document.getElementById('payment-section').offsetTop - 50, behavior: 'smooth' });
    }

    function submitRequest() {
        const utr = document.getElementById('utr-id').value;
        const upi = document.getElementById('user-upi').value;

        if(utr.length < 12) {
            showModal("Invalid UTR", "Please enter a valid 12-digit UTR number from your payment receipt.", '❌');
            return;
        }
        if(!upi.includes('@')) {
            showModal("Invalid UPI", "Please enter a valid UPI ID (e.g. name@bank).", '❌');
            return;
        }

        showModal("Request Received", "Your deposit is under verification. Balance will be added in 10-15 minutes.", '✅', true);
    }
</script>

</body>
</html>
