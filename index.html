<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Empire | VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #FFD700;
            --dark-gold: #B8860B;
            --bg-black: #080808;
            --card-bg: #121212;
            --input-border: #2A2A2A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-black); color: #fff; display: flex; justify-content: center; min-height: 100vh; }

        .main-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }
        .logo-container img {
            width: 160px;
            height: auto;
            filter: drop-shadow(0px 6px 15px rgba(255, 215, 0, 0.4));
        }

        .tab-box {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
            width: 100%;
            justify-content: flex-start;
            padding-left: 10px;
        }
        .tab-btn {
            font-size: 26px;
            font-weight: 800;
            color: #333;
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
        }
        .tab-btn.active { color: #fff; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 40px;
            height: 4px;
            background: var(--primary-gold);
            border-radius: 10px;
        }

        .form-section {
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            animation: slideFade 0.4s ease-out;
        }
        .form-section.active { display: flex; }

        .input-field {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--input-border);
            padding: 18px;
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .input-field:focus { border-color: var(--primary-gold); }

        .submit-btn {
            background: linear-gradient(135deg, var(--dark-gold), var(--primary-gold));
            color: #000;
            font-weight: 800;
            font-size: 18px;
            padding: 18px;
            border: none;
            border-radius: 15px;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .submit-btn:active { transform: scale(0.96); }

        .footer-text a {
            color: #555;
            font-size: 14px;
            text-decoration: underline;
            margin-top: 40px;
            display: block;
        }

        @keyframes slideFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="image1.png" alt="Logo">
        </div>

        <div class="tab-box">
            <div id="t-login" class="tab-btn active" onclick="showTab('login')">Log in</div>
            <div id="t-signup" class="tab-btn" onclick="showTab('signup')">Sign up</div>
        </div>

        <form id="f-login" class="form-section active" onsubmit="handle(event, 'login')">
            <input type="number" id="l-mob" class="input-field" placeholder="Mobile Number" required>
            <input type="password" id="l-pwd" class="input-field" placeholder="Password" required>
            <button type="submit" class="submit-btn">PROCEED VIP LOGIN</button>
        </form>

        <form id="f-signup" class="form-section" onsubmit="handle(event, 'signup')">
            <input type="number" id="s-mob" class="input-field" placeholder="Mobile Number" required>
            <input type="password" id="s-pwd" class="input-field" placeholder="Password (Min. 8 Let+Num)" required>
            <button type="submit" class="submit-btn">REGISTER SECURELY</button>
        </form>

        <div class="footer-text"><a href="#">Terms and conditions</a></div>
    </div>

    <script>
        function showTab(type) {
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById('f-' + type).classList.add('active');
            document.getElementById('t-' + type).classList.add('active');
        }

        function handle(e, type) {
            e.preventDefault();
            const pass = document.getElementById(type === 'login' ? 'l-pwd' : 's-pwd').value;
            const passRegex = /^(?=.*[0-9])(?=.*[a-zA-Z]).{8,}$/;

            if (type === 'signup') {
                if (!passRegex.test(pass)) {
                    alert("Galti: Password 8 char aur Letter+Number mix hona chahiye!");
                    return;
                }
                // Success: Redirect to index2.html
                window.location.href = "index2.html";
            } else {
                // Success: Redirect to index2.html
                window.location.href = "index2.html";
            }
        }
    </script>
</body>
</html>
